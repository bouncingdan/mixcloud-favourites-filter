<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixcloud Favourites Browser</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --bg2: #1a1a1e;
    --bg3: #242428;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.2);
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --accent: #1de9b6;
    --accent-bg: rgba(29,233,182,0.1);
    --danger: #ff6b6b;
    --danger-bg: rgba(255,107,107,0.1);
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 960px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  header h1 i { color: var(--accent); font-size: 22px; }
  header p { font-size: 14px; color: var(--text2); }

  .input-row { display: flex; gap: 8px; margin-top: 1.25rem; }
  input[type="text"] {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 14px;
    padding: 0 14px;
    height: 40px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text3); }

  button {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #0e0e10;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    height: 40px;
    padding: 0 20px;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text2);
    margin: 1rem 0;
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    font-size: 13px;
    color: var(--danger);
    background: var(--danger-bg);
    border: 1px solid rgba(255,107,107,0.25);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin: 1rem 0;
  }

  .genre-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1.25rem;
  }
  .pill {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .pill:hover { border-color: var(--border2); color: var(--text); }
  .pill.active {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .pill .cnt { opacity: 0.55; margin-left: 4px; }

  .stats-line { font-size: 13px; color: var(--text2); margin-bottom: 1rem; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s, transform 0.15s;
  }
  .card:hover { border-color: var(--border2); transform: translateY(-2px); }

  .thumb {
    width: 100%; aspect-ratio: 1;
    background: var(--bg3);
    position: relative; overflow: hidden;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .no-thumb {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; color: var(--text3);
  }
  .play-btn {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.5);
    opacity: 0; transition: opacity 0.15s;
  }
  .card:hover .play-btn { opacity: 1; }
  .play-btn i { font-size: 32px; color: #fff; }

  .card-body { padding: 10px 12px; }
  .card-title {
    font-size: 13px; font-weight: 500;
    color: var(--text); line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; margin-bottom: 4px;
    text-decoration: none;
  }
  .card-title:hover { color: var(--accent); }
  .card-artist {
    font-size: 12px; color: var(--text2);
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; margin-bottom: 8px;
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 11px; padding: 2px 8px;
    border-radius: 999px;
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer; border: none;
    transition: color 0.15s;
  }
  .tag:hover { color: var(--accent); }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text2);
    font-size: 14px;
  }

  .search-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.25rem;
    position: relative;
  }
  .search-row i {
    position: absolute;
    left: 12px;
    color: var(--text3);
    font-size: 16px;
    pointer-events: none;
  }
  .search-row input[type="text"] {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding-left: 36px;
    width: 100%;
  }
  .search-row .clear-btn {
    position: absolute;
    right: 10px;
    background: none;
    border: none;
    color: var(--text3);
    font-size: 16px;
    height: auto;
    padding: 4px;
    cursor: pointer;
    display: none;
  }
  .search-row .clear-btn:hover { color: var(--text2); opacity: 1; }

  mark {
    background: rgba(29,233,182,0.25);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  a { color: inherit; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><i class="ti ti-player-play"></i> Mixcloud favourites browser</h1>
    <p>Enter your Mixcloud username to load and filter your favourites by genre tag.</p>
    <div class="input-row">
      <input type="text" id="uname" placeholder="e.g. boilerroomtv" />
      <button id="loadBtn" onclick="loadFaves()">Load favourites</button>
    </div>
  </header>

  <div id="statusArea"></div>
  <div id="genreBar" class="genre-bar" style="display:none"></div>
  <div id="searchRow" class="search-row" style="display:none">
    <i class="ti ti-search"></i>
    <input type="text" id="searchInput" placeholder="Search by title, e.g. Digweed…" oninput="onSearch()" />
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()" title="Clear search">
      <i class="ti ti-x"></i>
    </button>
  </div>
  <div id="statsLine" class="stats-line" style="display:none"></div>
  <div id="grid" class="grid"></div>
</div>

<script>
let allFaves = [];
let allGenres = [];
let activeGenre = 'all';
let searchQuery = '';

function qs(id) { return document.getElementById(id); }

function onSearch() {
  searchQuery = qs('searchInput').value.trim().toLowerCase();
  qs('clearBtn').style.display = searchQuery ? 'block' : 'none';
  renderAll();
}

function clearSearch() {
  qs('searchInput').value = '';
  searchQuery = '';
  qs('clearBtn').style.display = 'none';
  renderAll();
  qs('searchInput').focus();
}

async function loadFaves() {
  const username = qs('uname').value.trim();
  if (!username) return;
  allFaves = []; allGenres = []; activeGenre = 'all'; searchQuery = '';
  qs('genreBar').style.display = 'none';
  qs('searchRow').style.display = 'none';
  qs('statsLine').style.display = 'none';
  qs('grid').innerHTML = '';
  qs('loadBtn').disabled = true;
  showStatus('loading', 'Fetching favourites…');

  let url = `https://api.mixcloud.com/${encodeURIComponent(username)}/favorites/?limit=50`;
  try {
    while (url) {
      const res = await fetch(url);
      if (!res.ok) {
        if (res.status === 404) throw new Error('User not found — double-check the username.');
        throw new Error('Mixcloud API error (' + res.status + ').');
      }
      const data = await res.json();
      if (data.error) throw new Error(data.error.message || 'API error');
      allFaves.push(...(data.data || []));
      showStatus('loading', 'Loading… ' + allFaves.length + ' mixes so far');
      url = data.paging?.next || null;
    }
    buildGenres();
    qs('searchRow').style.display = 'flex';
    qs('searchInput').value = '';
    qs('clearBtn').style.display = 'none';
    renderAll();
    showStatus(null);
  } catch (e) {
    showStatus('error', e.message.includes('Failed to fetch')
      ? 'Could not reach the Mixcloud API — possible CORS issue. Try opening this file via a local server, or use a browser with relaxed CORS restrictions.'
      : e.message);
  }
  qs('loadBtn').disabled = false;
}

function buildGenres() {
  const map = {};
  allFaves.forEach(f => {
    (f.tags || []).forEach(t => { map[t.name] = (map[t.name] || 0) + 1; });
  });
  allGenres = Object.entries(map).sort((a, b) => b[1] - a[1]).map(([name, count]) => ({ name, count }));
}

function renderGenreBar() {
  const bar = qs('genreBar');
  bar.style.display = 'flex';
  bar.innerHTML = '';
  const all = document.createElement('span');
  all.className = 'pill' + (activeGenre === 'all' ? ' active' : '');
  all.innerHTML = 'All <span class="cnt">' + allFaves.length + '</span>';
  all.onclick = () => { activeGenre = 'all'; renderAll(); };
  bar.appendChild(all);
  allGenres.slice(0, 50).forEach(g => {
    const p = document.createElement('span');
    p.className = 'pill' + (activeGenre === g.name ? ' active' : '');
    p.innerHTML = escHtml(g.name) + ' <span class="cnt">' + g.count + '</span>';
    p.onclick = () => { activeGenre = g.name; renderAll(); };
    bar.appendChild(p);
  });
}

function renderAll() {
  renderGenreBar();
  let filtered = activeGenre === 'all'
    ? allFaves
    : allFaves.filter(f => (f.tags || []).some(t => t.name === activeGenre));
  if (searchQuery) {
    filtered = filtered.filter(f => (f.name || '').toLowerCase().includes(searchQuery));
  }
  const stats = qs('statsLine');
  stats.style.display = 'block';
  let statMsg = filtered.length + ' mix' + (filtered.length !== 1 ? 'es' : '');
  if (activeGenre !== 'all') statMsg += ' tagged "' + activeGenre + '"';
  if (searchQuery) statMsg += ' matching "' + searchQuery + '"';
  stats.textContent = statMsg;
  const grid = qs('grid');
  grid.innerHTML = '';
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">No mixes found — try a different search or genre filter.</div>';
    return;
  }
  filtered.forEach(f => {
    const thumb = f.pictures?.medium || f.pictures?.thumbnail || '';
    const url = f.url || ('https://www.mixcloud.com' + f.key);
    const tags = (f.tags || []).slice(0, 3);
    const rawTitle = f.name || 'Untitled';
    const displayTitle = searchQuery ? highlightMatch(rawTitle, searchQuery) : escHtml(rawTitle);
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <a href="${escAttr(url)}" target="_blank" rel="noopener">
        <div class="thumb">
          ${thumb
            ? `<img src="${escAttr(thumb)}" alt="" loading="lazy">`
            : '<div class="no-thumb"><i class="ti ti-vinyl"></i></div>'}
          <div class="play-btn"><i class="ti ti-player-play"></i></div>
        </div>
      </a>
      <div class="card-body">
        <a href="${escAttr(url)}" target="_blank" rel="noopener" class="card-title">${displayTitle}</a>
        <p class="card-artist">${escHtml(f.user?.name || f.user?.username || '')}</p>
        <div class="card-tags">
          ${tags.map(t => `<button class="tag" onclick="filterToGenre('${escAttr(t.name)}')">${escHtml(t.name)}</button>`).join('')}
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function highlightMatch(text, query) {
  const escaped = escHtml(text);
  const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp('(' + escapedQuery + ')', 'gi'), '<mark>$1</mark>');
}

function filterToGenre(name) {
  activeGenre = name;
  renderAll();
  qs('genreBar').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showStatus(type, msg) {
  const el = qs('statusArea');
  if (!type) { el.innerHTML = ''; return; }
  if (type === 'loading') {
    el.innerHTML = `<div class="status"><div class="spinner"></div>${escHtml(msg)}</div>`;
  } else {
    el.innerHTML = `<div class="error"><i class="ti ti-alert-triangle" style="margin-right:6px"></i>${escHtml(msg)}</div>`;
  }
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/'/g,'&#39;'); }

qs('uname').addEventListener('keydown', e => { if (e.key === 'Enter') loadFaves(); });
</script>
</body>
</html>
